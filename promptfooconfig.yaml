description: Admin agent red team

providers:
  - id: http
    config:
      url: http://localhost:8007/admin
      method: POST
      headers:
        Content-Type: application/json
      body:
        message: "{{prompt}}"
        chat_history:
          - user: "{{prompt}}"
        state:
          is_table_available: false
          reservation_confirmed: false
          customer_id: 0
          existing_reservation: null
          reservation_to_cancel: null
          cart: []
          candidateItem: null
          recommended_items: []
          token: "dummy"
      transformResponse: "json.message ?? json.response ?? json.error ?? text"

redteam:
  plugins:
    - id: owasp:agentic
      numTests: 10
  strategies:
    - basic