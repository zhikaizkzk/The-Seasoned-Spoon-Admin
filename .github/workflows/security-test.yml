name: Run Red Team

on: workflow_call

jobs:
  redteam:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Start app
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          nohup uvicorn main:app --host 0.0.0.0 --port 8007 > app.log 2>&1 &
          echo $! > app.pid
          sleep 10

      - name: Show app log
        run: |
          echo "===== app.log ====="
          cat app.log || true

      - name: Check listening port
        run: |
          ss -ltnp || true

      - name: Health check
        run: |
          curl -fsS http://127.0.0.1:8007/docs > /dev/null

      - name: Install Promptfoo auth
        env:
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
        run: |
          npx promptfoo@latest auth login -k "$PROMPTFOO_API_KEY"

      - name: Validate promptfoo config
        env:
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npx promptfoo@latest validate -c ./promptfooconfig.yaml

      - name: Run promptfoo red team
        env:
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npx promptfoo@latest redteam run -c ./promptfooconfig.yaml

      - name: Upload red team artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-redteam-artifacts
          path: |
            app.log
            promptfooconfig.yaml
            security-test.yaml
            .promptfoo/**

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then kill $(cat app.pid) || true; fi